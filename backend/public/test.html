<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .pass { background-color: #d4edda; }
        .fail { background-color: #f8d7da; }
        button { margin: 5px; padding: 10px 15px; }
    </style>
</head>
<body>
    <h1>JavaScript 和 API 测试页面</h1>

    <div class="test" id="test1">
        <h3>1. JavaScript 执行测试</h3>
        <button onclick="document.getElementById('test1-result').innerHTML = '✓ JavaScript 正常工作'">点击测试 JavaScript</button>
        <div id="test1-result">等待测试...</div>
    </div>

    <div class="test" id="test2">
        <h3>2. 后端 API 连接测试</h3>
        <button onclick="testApi()">测试 API 连接</button>
        <div id="test2-result">等待测试...</div>
    </div>

    <div class="test" id="test3">
        <h3>3. localStorage 测试</h3>
        <button onclick="testLocalStorage()">测试 localStorage</button>
        <div id="test3-result">等待测试...</div>
    </div>

    <div class="test" id="test4">
        <h3>4. Bootstrap 加载测试</h3>
        <div id="test4-result">
            <button class="btn btn-primary" onclick="alert('Bootstrap 按钮工作')">Bootstrap 按钮测试</button>
            <div>如果按钮有样式，Bootstrap 已加载。</div>
        </div>
    </div>

    <div class="test" id="test5">
        <h3>5. 简单登录测试</h3>
        <input type="text" id="test-username" placeholder="用户名" value="admin">
        <input type="password" id="test-password" placeholder="密码" value="admin123">
        <button onclick="testLogin()">测试登录</button>
        <div id="test5-result">等待测试...</div>
    </div>

    <div class="test" id="test6">
        <h3>6. 直接访问管理页面</h3>
        <button onclick="window.location.href='/admin'">访问 /admin</button>
        <button onclick="window.location.href='/admin/'">访问 /admin/</button>
    </div>

    <script>
        function testApi() {
            const resultDiv = document.getElementById('test2-result');
            resultDiv.innerHTML = '正在测试 API 连接...';

            fetch('/health')
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('HTTP ' + response.status);
                })
                .then(data => {
                    resultDiv.innerHTML = '✓ API 连接正常: ' + JSON.stringify(data);
                    resultDiv.parentElement.className = 'test pass';
                })
                .catch(error => {
                    resultDiv.innerHTML = '✗ API 连接失败: ' + error.message;
                    resultDiv.parentElement.className = 'test fail';
                });
        }

        function testLocalStorage() {
            const resultDiv = document.getElementById('test3-result');
            try {
                localStorage.setItem('test', 'test-value');
                const value = localStorage.getItem('test');
                localStorage.removeItem('test');
                if (value === 'test-value') {
                    resultDiv.innerHTML = '✓ localStorage 工作正常';
                    resultDiv.parentElement.className = 'test pass';
                } else {
                    resultDiv.innerHTML = '✗ localStorage 返回值不正确';
                    resultDiv.parentElement.className = 'test fail';
                }
            } catch (error) {
                resultDiv.innerHTML = '✗ localStorage 不可用: ' + error.message;
                resultDiv.parentElement.className = 'test fail';
            }
        }

        function testLogin() {
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            const resultDiv = document.getElementById('test5-result');

            resultDiv.innerHTML = '正在测试登录...';

            // 模拟登录逻辑
            if (username === 'admin' && password === 'admin123') {
                resultDiv.innerHTML = '✓ 登录凭据正确';
                resultDiv.parentElement.className = 'test pass';

                // 模拟管理页面切换
                setTimeout(() => {
                    resultDiv.innerHTML += '<br>正在切换到管理页面...';
                    // 这里可以添加页面切换逻辑
                }, 1000);
            } else {
                resultDiv.innerHTML = '✗ 登录凭据错误';
                resultDiv.parentElement.className = 'test fail';
            }
        }

        // 页面加载时自动运行一些测试
        window.onload = function() {
            // 测试1：JavaScript
            document.getElementById('test1-result').innerHTML = '✓ 页面已加载，JavaScript 正在运行';
            document.getElementById('test1').className = 'test pass';

            // 测试4：Bootstrap
            const btn = document.querySelector('#test4-result button');
            if (btn && window.getComputedStyle(btn).borderRadius !== '0px') {
                document.getElementById('test4').className = 'test pass';
            } else {
                document.getElementById('test4').className = 'test fail';
            }
        };
    </script>

    <!-- 加载 Bootstrap 用于测试 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
